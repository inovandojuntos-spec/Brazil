<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Loja — Inovando Juntos</title>
<meta name="description" content="Loja oficial Inovando Juntos. Pagamento seguro via Nuvemshop." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#000; --card:#0b0b0b;
    --edge:rgba(255,255,255,.10); --edge2:rgba(255,255,255,.18);
    --text:rgba(255,255,255,.88); --muted:rgba(255,255,255,.56); --soft:rgba(255,255,255,.36);
    --accent:rgba(255,255,255,.92); --ember:#c7ccd4;
    --maxw:1180px;
    --font:"Manrope", system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    --display:"Jost", "Century Gothic", system-ui, sans-serif;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html{ scroll-behavior:smooth; }
  html,body{ margin:0; background:var(--bg); color:var(--text); font-family:var(--font); }
  a{ color:inherit; text-decoration:none; }
  img{ display:block; max-width:100%; }

  header{ position:sticky; top:0; z-index:40; display:flex; align-items:center; justify-content:space-between;
    padding:16px 22px; border-bottom:1px solid var(--edge); background:rgba(0,0,0,.72); backdrop-filter:blur(12px); }
  .brand{ display:flex; flex-direction:column; line-height:1; }
  .brand b{ font-weight:800; letter-spacing:.18em; font-size:13px; }
  .brand small{ font-weight:500; letter-spacing:.32em; font-size:8.5px; color:var(--soft); margin-top:5px; }
  /* Carrinho minimalista: ícone + número em cinza (20% maior) */
  .cart-ico{ display:inline-flex; align-items:center; gap:8px; background:transparent; border:0; cursor:pointer;
    color:#6f7378; padding:6px 4px; font-family:inherit; font-weight:700; font-size:16px; line-height:1; transition:color .2s ease; }
  .cart-ico:hover{ color:var(--ember); }
  .cart-ico svg{ width:29px; height:29px; }

  .lead-strip{ max-width:var(--maxw); margin:0 auto; padding:54px 22px 26px; }
  .eyebrow{ display:inline-flex; align-items:center; gap:12px; font-size:11px; letter-spacing:.32em; text-transform:uppercase; color:var(--soft); }
  .eyebrow::before{ content:""; width:30px; height:1px; background:var(--edge2); }
  .lead-strip h1{ font-family:var(--display); font-weight:400; font-size:clamp(28px,5vw,46px); margin:16px 0 8px; letter-spacing:.01em; }
  .lead-strip p{ color:var(--muted); max-width:54ch; margin:0; }

  .grid{ max-width:var(--maxw); margin:0 auto; padding:18px 22px 90px;
    display:grid; grid-template-columns:repeat(auto-fill, minmax(250px,1fr)); gap:22px; }
  .card{ border:1px solid var(--edge); border-radius:18px; overflow:hidden; background:var(--card); display:flex; flex-direction:column; transition:border-color .25s ease, transform .25s ease; }
  .card:hover{ border-color:var(--edge2); transform:translateY(-3px); }
  .thumb{ aspect-ratio:1/1; background:#111 center/cover no-repeat; }
  .card .body{ padding:16px 16px 18px; display:flex; flex-direction:column; gap:10px; flex:1; }
  .card h3{ font-size:15.5px; font-weight:700; margin:0; line-height:1.3; }
  .price{ font-family:var(--display); font-size:22px; font-weight:500; }
  .price .cur{ font-size:13px; color:var(--muted); }
  .price .old{ font-size:13px; color:var(--soft); text-decoration:line-through; margin-left:8px; font-family:var(--font); }
  select{ width:100%; background:#0a0a0a; border:1px solid #2a2a2a; border-radius:10px; padding:10px 12px; color:var(--text); font-size:14px; font-family:inherit; }
  .row{ display:flex; gap:10px; align-items:center; margin-top:auto; }
  .qty{ display:inline-flex; align-items:center; border:1px solid #2a2a2a; border-radius:10px; overflow:hidden; }
  .qty button{ width:34px; height:38px; background:transparent; border:0; color:var(--text); font-size:18px; cursor:pointer; }
  .qty button:hover{ background:rgba(255,255,255,.06); }
  .qty input{ width:38px; height:38px; text-align:center; background:transparent; border:0; color:var(--text); font-size:15px; font-family:inherit; }
  .btn{ flex:1; border:0; border-radius:10px; padding:12px 14px; font-family:inherit; font-weight:800; font-size:13.5px; letter-spacing:.04em; background:var(--accent); color:#000; cursor:pointer; }
  .btn:hover{ box-shadow:0 8px 20px rgba(0,0,0,.5); }
  .btn[disabled]{ opacity:.4; cursor:not-allowed; box-shadow:none; }
  .btn--ghost{ background:transparent; color:var(--text); border:1px solid var(--edge2); }
  .state{ max-width:var(--maxw); margin:0 auto; padding:60px 22px; text-align:center; color:var(--muted); }
  footer{ border-top:1px solid var(--edge); padding:28px 22px; text-align:center; color:var(--soft); font-size:12px; }
</style>
</head>
<body>

<header>
  <a class="brand" href="/landing.html" aria-label="Inovando Juntos">
    <b>INOVANDO JUNTOS</b>
    <small>CONEXÃO • COMUNICAÇÃO • INTIMIDADE</small>
  </a>
  <button class="cart-ico" data-ij-cart aria-label="Carrinho"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg><span data-ij-cart-count>0</span></button>
</header>

<section class="lead-strip">
  <span class="eyebrow">Loja oficial</span>
  <h1>Escolha sua experiência</h1>
  <p>Pagamento seguro processado pela Nuvemshop — PIX, cartão ou boleto. Frete e nota fiscal inclusos.</p>
</section>

<main class="grid" id="grid" aria-live="polite">
  <div class="state" id="state">Carregando produtos…</div>
</main>

<footer>© <span id="year"></span> Inovando Juntos · Loja oficial</footer>

<script src="store.js"></script>
<script>
(function(){
  "use strict";
  var ENDPOINT = "https://rsordtljnvxonaygyuxd.supabase.co/functions/v1/nuvemshop-create-draft-order";
  document.getElementById("year").textContent = new Date().getFullYear();

  function money(v){ return "R$ " + Number(v||0).toLocaleString("pt-BR", { minimumFractionDigits:2, maximumFractionDigits:2 }); }
  function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }
  function priceOf(v){ var p = v.promotional_price && Number(v.promotional_price)>0 ? v.promotional_price : v.price; return Number(p||0); }
  function clampQty(v){ var n=parseInt(String(v).replace(/[^0-9]/g,""),10); if(!isFinite(n)||n<1)n=1; if(n>99)n=99; return n; }

  fetch(ENDPOINT + "?action=catalog&per_page=50")
    .then(function(r){ return r.json(); })
    .then(function(d){ if(!d||!d.ok||!Array.isArray(d.products)) throw new Error("bad"); render(d.products); })
    .catch(function(){ document.getElementById("state").textContent = "Não foi possível carregar os produtos. Recarregue a página."; });

  function render(products){
    var grid = document.getElementById("grid");
    if(!products.length){ document.getElementById("state").textContent = "Nenhum produto disponível no momento."; return; }
    grid.innerHTML = "";
    products.forEach(function(p){
      var variants = (p.variants||[]).filter(function(v){ return v&&v.id; });
      if(!variants.length) return;
      var v0 = variants[0], hasOpts = variants.length>1;

      var card = document.createElement("div");
      card.className = "card";
      var opts = "";
      if(hasOpts){
        opts = '<select>' + variants.map(function(v){
          var label = v.values&&v.values.length ? v.values.join(" / ") : ("Opção "+v.id);
          var out = (Number(v.stock)<=0 && v.stock!==null);
          return '<option value="'+v.id+'"'+(out?' disabled':'')+'>'+esc(label)+(out?' (esgotado)':'')+' — '+money(priceOf(v))+'</option>';
        }).join("") + '</select>';
      }
      card.innerHTML =
        '<div class="thumb" style="background-image:url(\''+(p.image||"")+'\')"></div>' +
        '<div class="body">' +
          '<h3>'+esc(p.name)+'</h3>' +
          '<div class="price-wrap">'+priceBlock(v0)+'</div>' +
          opts +
          '<div class="row">' +
            '<div class="qty"><button type="button" data-dec>−</button><input type="text" value="1" inputmode="numeric"><button type="button" data-inc>+</button></div>' +
            '<button class="btn" type="button" data-add>Adicionar ao carrinho</button>' +
          '</div>' +
        '</div>';

      var sel = card.querySelector("select");
      var priceWrap = card.querySelector(".price-wrap");
      var qtyInput = card.querySelector(".qty input");
      function cur(){ if(!sel) return v0; return variants.filter(function(v){ return String(v.id)===sel.value; })[0] || v0; }
      if(sel) sel.addEventListener("change", function(){ priceWrap.innerHTML = priceBlock(cur()); });
      card.querySelector("[data-dec]").addEventListener("click", function(){ qtyInput.value = clampQty(clampQty(qtyInput.value)-1); });
      card.querySelector("[data-inc]").addEventListener("click", function(){ qtyInput.value = clampQty(clampQty(qtyInput.value)+1); });
      qtyInput.addEventListener("input", function(){ qtyInput.value = qtyInput.value.replace(/[^0-9]/g,""); });

      function item(){ var v = cur(); return { variant_id:v.id, name:p.name + (v.values&&v.values.length?(" — "+v.values.join("/")):""), price:priceOf(v), image:p.image, qty:clampQty(qtyInput.value) }; }
      card.querySelector("[data-add]").addEventListener("click", function(){ var v=cur(); if(Number(v.stock)<=0&&v.stock!==null) return; window.IJStore.addToCart(item(), true); });

      grid.appendChild(card);
    });
  }

  function priceBlock(v){
    var promo = v.promotional_price && Number(v.promotional_price)>0;
    var html = '<div class="price"><span class="cur">R$</span> ' + money(priceOf(v)).replace("R$ ","");
    if(promo) html += '<span class="old">'+money(v.price)+'</span>';
    html += '</div>';
    return html;
  }
})();
</script>
</body>
</html>

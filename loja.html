<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Loja — Inovando Juntos</title>
<meta name="description" content="Loja oficial Inovando Juntos. Produtos para casais por categoria. Pagamento seguro via Nuvemshop." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#000; --card:#0b0b0b;
    --edge:rgba(255,255,255,.10); --edge2:rgba(255,255,255,.18);
    --text:rgba(255,255,255,.88); --muted:rgba(255,255,255,.56); --soft:rgba(255,255,255,.36);
    --accent:rgba(255,255,255,.92); --ember:#c7ccd4;
    --maxw:1180px;
    --font:"Manrope", system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    --display:"Jost", "Century Gothic", system-ui, sans-serif;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html{ scroll-behavior:smooth; }
  html,body{ margin:0; background:var(--bg); color:var(--text); font-family:var(--font); }
  a{ color:inherit; text-decoration:none; }
  img{ display:block; max-width:100%; }

  header{ position:sticky; top:0; z-index:40; display:flex; align-items:center; justify-content:space-between;
    padding:14px 20px; border-bottom:1px solid var(--edge); background:rgba(0,0,0,.72); backdrop-filter:blur(12px); }
  .brand{ display:flex; flex-direction:column; line-height:1; }
  .brand b{ font-weight:800; letter-spacing:.18em; font-size:13px; }
  .brand small{ font-weight:500; letter-spacing:.32em; font-size:8.5px; color:var(--soft); margin-top:5px; }
  .cart-ico{ display:inline-flex; align-items:center; gap:8px; background:transparent; border:0; cursor:pointer;
    color:#6f7378; padding:6px 4px; font-family:inherit; font-weight:700; font-size:16px; line-height:1; transition:color .2s ease; }
  .cart-ico:hover{ color:var(--ember); }
  .cart-ico svg{ width:28px; height:28px; }

  .lead-strip{ max-width:var(--maxw); margin:0 auto; padding:18px 20px 8px; }
  .eyebrow{ display:inline-flex; align-items:center; gap:12px; font-size:11px; letter-spacing:.32em; text-transform:uppercase; color:var(--soft); }
  .eyebrow::before{ content:""; width:26px; height:1px; background:var(--edge2); }
  .lead-strip h1{ font-family:var(--display); font-weight:400; font-size:clamp(24px,4.6vw,38px); margin:10px 0 4px; letter-spacing:.01em; }
  .crumb{ display:inline-flex; align-items:center; gap:8px; color:#fff; font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; margin-top:6px; }
  .crumb:hover{ opacity:.7; }

  /* ===== Botão Voltar (header) ===== */
  .backbtn{ display:inline-flex; align-items:center; gap:7px; background:rgba(255,255,255,.06); border:1px solid var(--edge2); color:#fff; cursor:pointer;
    padding:9px 16px 9px 12px; border-radius:999px; font-family:inherit; font-weight:700; font-size:14px; line-height:1; transition:background .2s ease, transform .14s ease; }
  .backbtn:hover{ background:rgba(255,255,255,.14); }
  .backbtn:active{ transform:scale(.96); }
  .backbtn svg{ width:26px; height:26px; stroke:currentColor; stroke-width:2.4; fill:none; stroke-linecap:round; stroke-linejoin:round; }
  @media (max-width:560px){ .backbtn span{ display:none; } .backbtn{ padding:9px; } }

  /* ===== Mosaico de categorías · pantalla completa ===== */
  .mgrid{ position:relative; display:grid; grid-template-columns:repeat(2,1fr); grid-auto-rows:1fr; gap:1px;
    background:rgba(255,255,255,.09); width:100%; margin:0; padding:0; }
  @media (min-width:780px){ .mgrid{ grid-template-columns:repeat(3,1fr); } }

  /* ===== Intro: cartas de vidro + tela LED ===== */
  .tile{ perspective:1200px; }
  .tflip{ position:absolute; inset:0; transform-style:preserve-3d; transform:rotateY(180deg); transition:transform .9s cubic-bezier(.2,.85,.25,1); }
  .tile.revealed .tflip{ transform:rotateY(0deg); }
  .tface{ position:absolute; inset:0; backface-visibility:hidden; -webkit-backface-visibility:hidden; display:flex; align-items:center; justify-content:center; text-align:center; overflow:hidden; }
  .tface--front{ transform:rotateY(0deg); }
  .tface--glass{ transform:rotateY(180deg);
    background:linear-gradient(135deg,rgba(255,255,255,.05),rgba(255,255,255,0) 42%),radial-gradient(120% 90% at 30% 18%,rgba(199,204,212,.10),rgba(0,0,0,0) 55%),linear-gradient(160deg,#0c0c0e,#050506 62%,#0a0a0c); }
  .tface--glass::after{ content:""; position:absolute; inset:0; background-image:radial-gradient(rgba(255,255,255,.05) 1px, transparent 1px); background-size:7px 7px; opacity:.5; }
  .tface--glass::before{ content:""; position:absolute; left:-30%; top:-60%; width:55%; height:170%; transform:rotate(18deg);
    background:linear-gradient(90deg,rgba(255,255,255,0),rgba(255,255,255,.06),rgba(255,255,255,0)); }
  .ledintro{ position:absolute; inset:0; z-index:6; display:flex; align-items:center; justify-content:center; text-align:center; padding:20px; background:#000; overflow:hidden; }
  .ledintro.fade{ opacity:0; transition:opacity .7s ease; }
  .led-inner{ position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:92%; display:flex; flex-direction:column; align-items:center; gap:18px; }
  .led-msg{ white-space:pre-line; min-height:1.5em;
    font-family:var(--display); font-weight:400; letter-spacing:.02em; font-size:clamp(15px,3.4vw,26px); line-height:1.55;
    color:#eaf1ff; text-shadow:0 0 7px rgba(150,190,255,.45),0 0 18px rgba(90,150,255,.28); }
  .led-msg.typing::after{ content:"▌"; margin-left:1px; color:#9fc2ff; animation:caretBlink .85s steps(1) infinite; }
  .led-logo{ opacity:0; transform:translateY(8px); transition:opacity .6s ease, transform .6s ease; }
  .led-logo.show{ opacity:1; transform:none; }
  .led-logo b{ display:block; font-family:var(--font); font-weight:800; letter-spacing:.2em; font-size:clamp(16px,3.6vw,28px); color:#fff; text-shadow:0 0 12px rgba(199,204,212,.6); }
  .led-logo small{ display:block; margin-top:9px; letter-spacing:.34em; font-size:9px; color:var(--soft); }
  @keyframes caretBlink{ 0%,50%{opacity:1;} 51%,100%{opacity:0;} }
  @media (prefers-reduced-motion: reduce){ .tflip{ transition:none; } }
  .tile{ position:relative; overflow:hidden; border:0; cursor:pointer; background:#000;
    display:flex; align-items:center; justify-content:center; text-align:center; min-height:0; }
  .tmedia{ position:absolute; inset:0; }
  .tmedia .cm{ position:absolute; inset:0; background:#111 center/cover no-repeat; opacity:0; transition:opacity .9s ease; }
  .tmedia .cm.on{ opacity:1; }
  .tmedia::after{ content:""; position:absolute; inset:0; z-index:1;
    background:linear-gradient(180deg, rgba(0,0,0,.30), rgba(0,0,0,.55) 55%, rgba(0,0,0,.86));
    opacity:.62; transition:opacity .55s ease; }
  .tile:hover .tmedia::after, .tile.in .tmedia::after{ opacity:.84; }
  .tbody{ position:relative; z-index:2; padding:14px; width:100%;
    opacity:0; transform:translateY(12px); transition:opacity .6s ease, transform .6s ease; }
  .tile.in .tbody{ opacity:1; transform:none; }
  .ttitle{ color:#fff; font-family:var(--display); font-weight:400; font-size:clamp(17px,4.2vw,25px); margin:0 0 4px;
    letter-spacing:.02em; line-height:1.14; text-shadow:0 2px 14px rgba(0,0,0,.75); }
  .tdesc{ color:#fff; font-size:clamp(10.5px,2.5vw,13px); line-height:1.36; margin:0 auto 8px; max-width:26ch;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .tcta{ display:inline-block; margin-top:6px; font-size:11px; letter-spacing:.08em; font-weight:700; color:#fff; text-transform:uppercase; }
  .tcount{ position:absolute; top:10px; right:10px; z-index:3; font-size:10.5px; font-weight:700;
    background:rgba(0,0,0,.45); border:1px solid var(--edge2); border-radius:999px; padding:2px 8px; color:#fff; }

  /* ===== Lista de produtos (scroll) ===== */
  .plist{ max-width:1000px; margin:0 auto; padding:6px 0 50px; }
  .pitem{ display:grid; grid-template-columns:1fr 1fr; gap:26px; padding:30px 22px; border-top:1px solid var(--edge);
    opacity:0; transform:translateY(16px); transition:opacity .55s ease, transform .55s ease; }
  .pitem.in{ opacity:1; transform:none; }
  .pitem:first-child{ border-top:0; }
  @media (max-width:760px){ .pitem{ grid-template-columns:1fr; gap:16px; padding:22px 18px; } }
  .pi-main{ position:relative; width:100%; aspect-ratio:1/1; background:#111; border-radius:16px; overflow:hidden; }
  .pi-main .cm{ position:absolute; inset:0; background:#111 center/cover no-repeat; opacity:0; transition:opacity .8s ease; }
  .pi-main .cm.on{ opacity:1; }
  .pi-thumbs{ display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
  .pi-thumbs .th{ width:52px; height:52px; border-radius:9px; background:#111 center/cover no-repeat; border:1px solid var(--edge); cursor:pointer; opacity:.55; transition:opacity .2s ease, border-color .2s ease; }
  .pi-thumbs .th.on{ opacity:1; border-color:var(--edge2); }
  .pi-info{ display:flex; flex-direction:column; gap:12px; align-self:center; }
  .pi-name{ font-family:var(--display); font-weight:400; font-size:clamp(22px,3.2vw,30px); margin:0; color:#fff; line-height:1.18; }
  .pi-stk{ align-self:flex-start; font-size:11.5px; font-weight:700; padding:3px 11px; border-radius:999px; border:1px solid var(--edge); }
  .pi-stk.ok{ color:#bfe9d4; } .pi-stk.no{ color:#f2a6a6; }
  .pi-sold{ font-size:12.5px; color:#f3c6a5; font-weight:700; }
  .pi-price{ font-family:var(--display); font-size:28px; font-weight:500; color:#fff; }
  .pi-price .cur{ font-size:14px; color:var(--muted); }
  .pi-price .old{ font-size:14px; color:var(--soft); text-decoration:line-through; margin-left:8px; font-family:var(--font); }
  .pi-desc{ color:var(--muted); font-size:14px; line-height:1.6; margin:0; text-align:justify; }
  .pi-buy{ display:flex; gap:10px; align-items:center; margin-top:4px; }
  .qty{ display:inline-flex; align-items:center; border:1px solid #2a2a2a; border-radius:10px; overflow:hidden; }
  .qty button{ width:34px; height:42px; background:transparent; border:0; color:var(--text); font-size:18px; cursor:pointer; }
  .qty button:hover{ background:rgba(255,255,255,.06); }
  .qty input{ width:42px; height:42px; text-align:center; background:transparent; border:0; color:var(--text); font-size:15px; font-family:inherit; }
  .btn{ flex:1; border:0; border-radius:10px; padding:13px 16px; font-family:inherit; font-weight:800; font-size:13.5px; letter-spacing:.04em; background:var(--accent); color:#000; cursor:pointer; }
  .btn:hover{ box-shadow:0 8px 20px rgba(0,0,0,.5); }
  .btn[disabled]{ opacity:.4; cursor:not-allowed; box-shadow:none; }

  /* ===== Raspadinha de cupom por produto ===== */
  .pi-price .pp-base.struck{ text-decoration:line-through; opacity:.5; }
  .pi-price .pp-new{ display:inline-block; margin-left:10px; color:#fff; }
  .pi-cupom{ margin-top:6px; }
  .lscr-stage{ position:relative; width:min(210px,72%); aspect-ratio:1/1; border-radius:14px; overflow:hidden;
    border:1px solid rgba(199,204,212,.32); background:#060606; touch-action:none;
    box-shadow:0 16px 40px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.06); }
  .lscr-prize{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; text-align:center; padding:8px 12px;
    background:radial-gradient(75% 80% at 50% 45%, rgba(199,204,212,.14), rgba(0,0,0,0) 64%), #070708; }
  .lscr-off{ font-family:var(--display); font-weight:500; line-height:1; color:#fff; display:flex; align-items:baseline; gap:.08em; font-size:clamp(20px,5vw,28px); }
  .lscr-off b{ font-weight:600; color:var(--ember); }
  .lscr-off i{ font-style:normal; font-size:.5em; font-weight:600; color:var(--soft); }
  .lscr-code{ font-size:10.5px; color:var(--muted); }
  .lscr-code b{ color:var(--ember); letter-spacing:.1em; font-weight:800; font-size:1.2em; border:1px dashed rgba(199,204,212,.5); padding:2px 7px; border-radius:7px; margin-left:3px; }
  .lscr-valid{ margin-top:4px; font-size:12px; letter-spacing:.02em; color:rgba(220,226,233,.92); font-weight:700; min-height:1em; }
  .lscr-valid.typing::after{ content:"|"; margin-left:1px; color:var(--ember); animation:lscrCaret .7s step-end infinite; }
  @keyframes lscrCaret{ 0%,100%{opacity:1} 50%{opacity:0} }
  .lscr-valid.pulse{ display:inline-block; padding:2px 9px; border-radius:9px; animation:lscrValidPulse .9s ease-in-out infinite; }
  @keyframes lscrValidPulse{ 0%,100%{ background:rgba(224,122,63,0); color:rgba(220,226,233,.92); box-shadow:0 0 0 rgba(224,122,63,0); transform:scale(1); }
    50%{ background:rgba(224,122,63,.20); color:#fff; box-shadow:0 0 14px rgba(224,122,63,.4); transform:scale(1.06); } }
  @media (prefers-reduced-motion: reduce){ .lscr-valid.pulse{ animation:none; background:rgba(224,122,63,.16); } .lscr-valid.typing::after{ display:none; } }
  .lscr-canvas{ position:absolute; inset:0; width:100%; height:100%; cursor:grab; touch-action:none; }
  .lscr-hint{ position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); z-index:3; width:90%; text-align:center;
    font-family:var(--display); font-size:clamp(10.5px,2.4vw,13px); letter-spacing:.04em; text-transform:uppercase; color:rgba(8,8,10,.82); font-weight:800; pointer-events:none; transition:opacity .4s ease; }
  .lj-toast{ position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(18px); z-index:1003; background:#fff; color:#000; padding:11px 18px; border-radius:999px; font-family:var(--font); font-weight:700; font-size:13px; opacity:0; transition:all .25s ease; pointer-events:none; }
  .lj-toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  .state{ max-width:var(--maxw); margin:0 auto; padding:60px 22px; text-align:center; color:var(--muted); }
  footer{ border-top:1px solid var(--edge); padding:24px 22px; text-align:center; color:var(--soft); font-size:12px; }
  @media (prefers-reduced-motion: reduce){ .tbody,.pitem{ opacity:1; transform:none; } .tmedia::after{ opacity:.82; } .tmedia .cm,.pi-main .cm{ transition:none; } }
</style>
</head>

<script>
/* ---- Meta Pixel (browser) — mismo PIXEL_ID e lógica de index.html.
   loja.html não tinha NENHUM tracking: fbp/fbc nunca eram capturados para
   quem chega direto nesta página (ou navega para cá antes do checkout),
   por isso `fbc` sempre chegava null no CAPI (nuvemshop-webhook). ---- */
(function(){
  var META_PIXEL_ID = "1046549447944946";
  var ready = false;

  function consentOK(){ try { return localStorage.getItem("ij_consent") === "accept"; } catch(e){ return false; } }
  function uuid(){ if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
    return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g,function(c){var r=Math.random()*16|0,v=c==="x"?r:(r&0x3|0x8);return v.toString(16);}); }

  // Captura _fbc desde fbclid (idéntico a index.html). O Pixel seta _fbp sozinho.
  (function(){
    try{
      var fbclid = new URLSearchParams(location.search).get("fbclid");
      if (fbclid && !/(^|;\s*)_fbc=/.test(document.cookie)){
        document.cookie = "_fbc=fb.1." + Date.now() + "." + fbclid + ";path=/;max-age=7776000;samesite=Lax";
      }
    }catch(e){}
  })();

  function init(){
    if (ready || !consentOK()) return;
    if (!window.fbq){
      !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version="2.0";n.queue=[];t=b.createElement(e);t.async=!0;t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,document,"script","https://connect.facebook.net/en_US/fbevents.js");
    }
    window.fbq("init", META_PIXEL_ID);
    ready = true;
    track("PageView");
  }

  function track(event, params, eventId){
    try{
      if (window.fbq && ready && consentOK()){
        var opts = eventId ? { eventID: eventId } : undefined;
        window.fbq("track", event, params || {}, opts);
      }
    }catch(e){}
    if (window.ijTrack) window.ijTrack("meta_" + event, Object.assign({ event_id: eventId || null }, params || {}));
  }

  window.ijMeta = { PIXEL_ID: META_PIXEL_ID, CURRENCY: "BRL", track: track, init: init, uuid: uuid, ready: function(){ return ready; }, consentOK: consentOK };

  // Se o consentimento já foi aceito antes (ex: veio de index.html), inicia direto.
  if (consentOK()) init();
})();
</script>

<script>
(function(){
  "use strict";
  var ENDPOINT = "https://rsordtljnvxonaygyuxd.supabase.co/functions/v1/store-catalog";

  var CAT_DESC = {
    "Jogos":"A experiência que aproxima o casal. Conexão de verdade.",
    "Vibradores Liquidos":"Géis que vibram, esquentam e pulsam.",
    "Vibradores":"Para o casal explorar o prazer juntos.",
    "Massagem":"Velas e géis para o toque virar ritual.",
    "Lubrificante":"Mais conforto e deslize.",
    "Beijáveis":"Caldas e sabores para as preliminares.",
    "Bondage":"Para quem quer ousar com confiança.",
    "Higiene":"Cuidado e bem-estar íntimo.",
    "Outros":"Novidades para o casal."
  };
  // Vendidos por produto (placeholder · a completar no futuro): { "<product_id>": 123 }
  var SOLD = {};

  function money(v){ return "R$ " + Number(v||0).toLocaleString("pt-BR", { minimumFractionDigits:2, maximumFractionDigits:2 }); }
  function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;"); }
  function priceOf(v){ if(!v) return 0; var p = v.promotional_price && Number(v.promotional_price)>0 ? v.promotional_price : v.price; return Number(p||0); }
  function available(v){ if(!v) return false; if(priceOf(v)<=0) return false; if(v.stock===null) return true; return Number(v.stock)>0; }
  function clampQty(v){ var n=parseInt(String(v).replace(/[^0-9]/g,""),10); if(!isFinite(n)||n<1)n=1; if(n>99)n=99; return n; }
  function qs(name){ return new URLSearchParams(location.search).get(name); }
  function fitViewport(el){ var t = el.getBoundingClientRect().top; el.style.height = Math.max(320,(window.innerHeight - t)) + "px"; }

  document.getElementById("year").textContent = new Date().getFullYear();

  // Botão Voltar inteligente: dentro de categoria → mosaico; no mosaico → landing.
  function updateBack(){
    var cat = qs("cat"), lbl = document.getElementById("backLbl");
    if(!lbl) return;
    lbl.textContent = (cat!==null && cat!=="") ? "Voltar" : "Início";
  }
  (function(){
    var bb = document.getElementById("backBtn");
    if(bb) bb.addEventListener("click", function(){
      var cat = qs("cat");
      location.href = (cat!==null && cat!=="") ? "loja.html" : "/";
    });
  })();

  var DATA = null, timers = [], onResize = null, scratchers = [], introHandled = false;
  function clearTimers(){
    timers.forEach(clearInterval); timers = [];
    if(onResize){ window.removeEventListener("resize", onResize); onResize=null; }
    scratchers.forEach(function(s){ if(s.cleanup) s.cleanup(); }); scratchers = [];
  }

  /* ---- Cupons: raspadinha por produto (mesma mecânica da landing) ---- */
  // Guarda o cupom com seu SCOPE completo para que store.js calcule o desconto como o backend.
  function persistCoupon(code, pct, scope){
    try{ localStorage.setItem("ij_coupon", JSON.stringify({
      code:code, pct:pct, type:"percentage", value:pct,
      min_price:(scope && Number(scope.min_price))||0,
      valid_from:(scope && scope.start_date)||null,
      valid_until:(scope && scope.end_date)||null,
      product_ids:(scope && scope.product_ids)||[],
      category_ids:(scope && scope.category_ids)||[]
    })); }catch(e){}
  }
  // Fecha ISO (YYYY-MM-DD) → DD/MM/AAAA para "Válido até".
  function fmtCupomDate(iso){ if(!iso) return ""; var q=String(iso).slice(0,10).split("-"); return q.length===3?(q[2]+"/"+q[1]+"/"+q[0]):""; }
  // Melhor cupom % aplicável a um produto (product_ids, category_ids ou loja inteira). Maior % primeiro.
  function couponForProduct(p){
    var cps = (DATA && DATA.coupons) || [];
    var pid = Number(p.id), cats = (p.category_ids||[]).map(Number);
    var app = cps.filter(function(c){
      if(c.type!=="percentage" || !(Number(c.value)>0)) return false;
      var pids=(c.product_ids||[]).map(Number), cids=(c.category_ids||[]).map(Number);
      if(pids.length===0 && cids.length===0) return true;          // loja inteira
      if(pids.indexOf(pid)!==-1) return true;
      for(var k=0;k<cats.length;k++) if(cids.indexOf(cats[k])!==-1) return true;
      return false;
    });
    app.sort(function(a,b){ return Number(b.value)-Number(a.value); });
    return app[0] || null;
  }
  var _toastEl=null, _toastT;
  function toastMsg(m){
    if(!_toastEl){ _toastEl=document.createElement("div"); _toastEl.className="lj-toast"; document.body.appendChild(_toastEl); }
    _toastEl.textContent=m; _toastEl.classList.add("show");
    clearTimeout(_toastT); _toastT=setTimeout(function(){ _toastEl.classList.remove("show"); }, 2200);
  }
  // Monta a raspadinha sobre uma .lscr-stage. opts: { pct, onProgress(disc), onComplete() }
  function mountScratch(stage, opts){
    var canvas = stage.querySelector(".lscr-canvas");
    var hint = stage.querySelector(".lscr-hint");
    var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    var ctx = canvas.getContext("2d");
    var drawing=false, cleared=false, started=false, last=0;
    var MAXPCT=opts.pct, TARGET=0.80;
    function size(){ var r=stage.getBoundingClientRect(); if(!r.width) return; var dpr=Math.min(window.devicePixelRatio||1,2);
      canvas.width=r.width*dpr; canvas.height=r.height*dpr; ctx.setTransform(dpr,0,0,dpr,0,0); cover(r.width,r.height); }
    function cover(w,h){ var g=ctx.createLinearGradient(0,0,w,h); g.addColorStop(0,"#c7ccd4"); g.addColorStop(.5,"#8a909a"); g.addColorStop(1,"#aab0ba");
      ctx.globalCompositeOperation="source-over"; ctx.fillStyle=g; ctx.fillRect(0,0,w,h);
      ctx.fillStyle="rgba(0,0,0,.10)"; for(var i=0;i<w;i+=18){ for(var j=0;j<h;j+=18){ ctx.fillRect(i,j,2,2); } } }
    function pos(ev){ var r=canvas.getBoundingClientRect(); var pt=ev.touches?ev.touches[0]:ev; return { x:pt.clientX-r.left, y:pt.clientY-r.top }; }
    function scratch(ev){ if(!drawing) return; var pt=pos(ev); ctx.globalCompositeOperation="destination-out"; ctx.globalAlpha=1; ctx.fillStyle="#000";
      ctx.beginPath(); ctx.arc(pt.x,pt.y,20,0,Math.PI*2); ctx.fill(); if(!started){ started=true; if(hint) hint.style.opacity="0"; } update(); }
    function clearedFraction(){ try{ var img=ctx.getImageData(0,0,canvas.width,canvas.height).data, clr=0, step=80, n=0;
      for(var i=3;i<img.length;i+=4*step){ n++; if(img[i]<128) clr++; } return n?clr/n:0; }catch(e){ return 0; } }
    function update(){ var now=Date.now(); if(now-last<50) return; last=now; var frac=clearedFraction();
      var disc=Math.min(MAXPCT, Math.round(frac/TARGET*MAXPCT)); if(opts.onProgress) opts.onProgress(disc);
      if(disc>=MAXPCT && !cleared){ cleared=true; canvas.style.transition="opacity .5s ease"; canvas.style.opacity="0";
        setTimeout(function(){ canvas.style.display="none"; },520); if(opts.onComplete) opts.onComplete(); } }
    var up=function(){ drawing=false; };
    canvas.addEventListener("pointerdown", function(e){ drawing=true; scratch(e); });
    window.addEventListener("pointerup", up);
    canvas.addEventListener("pointermove", scratch);
    canvas.addEventListener("touchstart", function(e){ drawing=true; scratch(e); }, { passive:true });
    canvas.addEventListener("touchmove", function(e){ scratch(e); }, { passive:true });
    canvas.addEventListener("touchend", function(){ drawing=false; });
    if(reduce){ canvas.style.display="none"; if(hint) hint.style.display="none"; if(opts.onProgress) opts.onProgress(MAXPCT); if(opts.onComplete) opts.onComplete(); }
    else { size(); }
    scratchers.push({ size:size, cleared:function(){ return cleared; }, cleanup:function(){ window.removeEventListener("pointerup", up); } });
  }

  fetch(ENDPOINT + "?t=" + Date.now())
    .then(function(r){ return r.json(); })
    .then(function(d){ if(!d||!d.ok||!Array.isArray(d.products)) throw new Error("bad"); DATA = d; route(); })
    .catch(function(){ document.getElementById("state").textContent = "Não foi possível carregar a loja. Recarregue a página."; });

  function route(){
    clearTimers();
    updateBack();
    var cat = qs("cat");
    if(cat===null || cat==="") renderMosaic();
    else renderCategory(cat);
  }

  function productsOfCat(catId){
    catId = String(catId);
    return DATA.products.filter(function(p){
      if(catId==="0") return !p.category_ids || p.category_ids.length===0;
      return (p.category_ids||[]).map(String).indexOf(catId) !== -1;
    });
  }
  function imagesOfCat(catId){
    var imgs = [];
    productsOfCat(catId).forEach(function(p){
      var arr = (p.images && p.images.length) ? p.images : (p.image ? [p.image] : []);
      arr.forEach(function(s){ if(s) imgs.push(s); });
    });
    return imgs;
  }

  // crossfade entre fotos dentro de un contenedor con capas .cm
  function makeCycler(mediaEl, imgs, ms){
    var a=document.createElement("div"); a.className="cm on";
    var b=document.createElement("div"); b.className="cm";
    a.style.backgroundImage="url('"+(imgs[0]||"")+"')";
    mediaEl.appendChild(a); mediaEl.appendChild(b);
    if(imgs.length<2) return;
    imgs.forEach(function(s){ var im=new Image(); im.src=s; });
    var idx=0, front=a, back=b;
    var t=setInterval(function(){
      idx=(idx+1)%imgs.length;
      back.style.backgroundImage="url('"+imgs[idx]+"')";
      back.classList.add("on"); front.classList.remove("on");
      var tmp=front; front=back; back=tmp;
    }, ms || (3400 + Math.floor(Math.random()*1600)));
    timers.push(t);
  }

  function revealAll(nodes){
    var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    if(reduce || !("IntersectionObserver" in window)){ nodes.forEach(function(n){ n.classList.add("in"); }); return; }
    var io = new IntersectionObserver(function(es){ es.forEach(function(e){ if(e.isIntersecting){ e.target.classList.add("in"); io.unobserve(e.target); } }); }, { threshold:0.15 });
    nodes.forEach(function(n){ io.observe(n); });
  }

  // ===== Nivel 1: Mosaico de categorías (fotos rotando + frase tipo raspadinha) =====
  function renderMosaic(){
    document.title = "Loja — Inovando Juntos";
    document.getElementById("lead").style.display="none";
    document.getElementById("foot").style.display="none";

    var main = document.getElementById("main");
    var cats = (DATA.categories||[]).filter(function(c){ return c.count>0 && c.id!==0; });
    if(!cats.length){ document.getElementById("lead").style.display=""; main.innerHTML = '<div class="state">Nenhuma categoria disponível no momento.</div>'; return; }
    main.innerHTML = '<div class="mgrid" id="grid"></div>';
    var grid = document.getElementById("grid");

    cats.forEach(function(c){
      var a = document.createElement("a");
      a.className = "tile in";
      a.href = "loja.html?cat=" + encodeURIComponent(c.id);
      a.innerHTML =
        '<div class="tflip">' +
          '<div class="tface tface--front">' +
            '<span class="tcount">'+c.count+'</span>' +
            '<div class="tmedia"></div>' +
            '<div class="tbody">' +
              '<h3 class="ttitle">'+esc(c.name)+'</h3>' +
              '<p class="tdesc">'+esc(CAT_DESC[c.name]||"Produtos para o casal.")+'</p>' +
              '<span class="tcta">Ver produtos →</span>' +
            '</div>' +
          '</div>' +
          '<div class="tface tface--glass" aria-hidden="true"></div>' +
        '</div>';
      grid.appendChild(a);
      makeCycler(a.querySelector(".tmedia"), imagesOfCat(c.id));
    });

    onResize=function(){ fitViewport(grid); }; window.addEventListener("resize", onResize);
    fitViewport(grid);
    introMosaic(grid, grid.querySelectorAll(".tile"));
  }

  // Intro do mosaico: tela preta LED, texto digitado e o logo aparece embaixo na mesma tela.
  function introMosaic(grid, tiles){
    var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    function revealNow(){ tiles.forEach(function(t){ t.classList.add("revealed"); }); }
    if(reduce){ revealNow(); return; }
    // decide só uma vez por carregamento (voltar do produto ao mosaico não repete a intro)
    if(introHandled){ revealNow(); return; }
    introHandled = true;
    var force = /[?&]intro=1/.test(location.search);                  // ?intro=1 força a intro
    var n = 1; try { n = (parseInt(localStorage.getItem("ij_intro_n_loja"),10) || 0) + 1; localStorage.setItem("ij_intro_n_loja", String(n)); } catch(e){}
    if(!force && (n % 6 !== 1)){ revealNow(); return; }               // mostra no 1º ingresso e a cada 6

    var led = document.createElement("div");
    led.className = "ledintro";
    led.innerHTML =
      '<div class="led-inner">' +
        '<div class="led-msg" aria-label="Selecionamos os melhores itens íntimos para tornar a experiência de vocês ainda mais intensa"></div>' +
        '<div class="led-logo"><b>INOVANDO JUNTOS</b></div>' +
      '</div>';
    grid.appendChild(led);
    var msg = led.querySelector(".led-msg"), logo = led.querySelector(".led-logo");
    var MSG = "Selecionamos os melhores itens íntimos\npara tornar a experiência de vocês\nainda mais intensa.";

    function flips(){
      var order = []; for(var i=0;i<tiles.length;i++) order.push(i);
      for(var k=order.length-1;k>0;k--){ var j=Math.floor(Math.random()*(k+1)); var t=order[k]; order[k]=order[j]; order[j]=t; }
      order.forEach(function(idx, pos){ timers.push(setTimeout(function(){ tiles[idx].classList.add("revealed"); }, 250 + pos*260)); });
    }

    // efeito máquina de escrever (char a char) com cursor piscante; ao terminar, o logo surge embaixo
    msg.classList.add("typing");
    var ci = 0;
    var typeId = setInterval(function(){
      if(ci >= MSG.length){
        clearInterval(typeId); msg.classList.remove("typing");
        timers.push(setTimeout(function(){ logo.classList.add("show"); }, 250));
        timers.push(setTimeout(function(){ led.classList.add("fade"); }, 2000));
        timers.push(setTimeout(function(){ if(led.parentNode) led.parentNode.removeChild(led); flips(); }, 2400));
        return;
      }
      msg.textContent += MSG.charAt(ci++);
    }, 28);
    timers.push(typeId);
  }

  // ===== Nivel 2: Lista scrollable de produtos =====
  function renderCategory(catId){
    document.getElementById("lead").style.display="";
    document.getElementById("foot").style.display="";
    var cat = (DATA.categories||[]).filter(function(c){ return String(c.id)===String(catId); })[0];
    var catName = cat ? cat.name : "Produtos";
    document.getElementById("eyebrow").textContent = "Categoria";
    document.getElementById("leadTitle").textContent = catName;
    document.getElementById("crumb").hidden = true; // back fica no header (botão Voltar)
    document.title = catName + " — Loja Inovando Juntos";

    var list = productsOfCat(catId);
    var main = document.getElementById("main");
    if(!list.length){ main.innerHTML = '<div class="state">Nenhum produto nesta categoria. <a class="crumb" href="loja.html">← Voltar</a></div>'; return; }
    main.innerHTML = '<div class="plist" id="plist"></div>';
    var plist = document.getElementById("plist");

    list.forEach(function(p){
      var v0 = (p.variants||[])[0];
      var ok = available(v0);
      var imgs = (p.images&&p.images.length?p.images:[p.image]).filter(Boolean);
      var sold = SOLD[p.id];
      var coup = ok ? couponForProduct(p) : null;
      var pct = coup ? Math.round(coup.value) : 0;
      var priceSec = coup
        ? '<div class="pi-price"><span class="pp-base">'+priceBlock(v0)+'</span><span class="pp-new" hidden></span></div>' +
          '<div class="pi-cupom"><div class="lscr-stage" role="img" aria-label="Raspe para descobrir o cupom">' +
            '<div class="lscr-prize" aria-hidden="true"><div class="lscr-off"><b class="lscr-pct">0</b><i>%</i> OFF</div>' +
            '<div class="lscr-code">Cupom <b>'+esc(coup.code)+'</b></div>' +
            '<div class="lscr-valid" hidden></div></div>' +
            '<canvas class="lscr-canvas"></canvas><span class="lscr-hint">Raspe e descubra seu desconto</span></div></div>'
        : '<div class="pi-price">'+priceBlock(v0)+'</div>';

      var it = document.createElement("article");
      it.className = "pitem";
      it.innerHTML =
        '<div class="pi-media">' +
          '<div class="pi-main"></div>' +
          '<div class="pi-thumbs"></div>' +
        '</div>' +
        '<div class="pi-info">' +
          '<h2 class="pi-name">'+esc(p.name)+'</h2>' +
          '<span class="pi-stk '+(ok?"ok":"no")+'">'+(ok?"Em estoque":"Indisponível")+'</span>' +
          (sold&&sold>0 ? '<div class="pi-sold">🔥 '+sold+' já vendidos</div>' : '') +
          priceSec +
          (p.desc_full||p.desc ? '<p class="pi-desc">'+esc(p.desc_full||p.desc)+'</p>' : '') +
          '<div class="pi-buy">' +
            '<div class="qty"><button type="button" data-dec>−</button><input type="text" value="1" inputmode="numeric"><button type="button" data-inc>+</button></div>' +
            '<button class="btn" type="button" data-add'+(ok?"":" disabled")+'>'+(ok?"Adicionar ao carrinho":"Indisponível")+'</button>' +
          '</div>' +
        '</div>';
      plist.appendChild(it);

      // galería con auto-pase (crossfade) + miniaturas sincronizadas
      gallery(it.querySelector(".pi-main"), it.querySelector(".pi-thumbs"), imgs);

      // qty + add
      var qtyInput = it.querySelector(".qty input");
      it.querySelector("[data-dec]").addEventListener("click", function(){ qtyInput.value=clampQty(clampQty(qtyInput.value)-1); });
      it.querySelector("[data-inc]").addEventListener("click", function(){ qtyInput.value=clampQty(clampQty(qtyInput.value)+1); });
      qtyInput.addEventListener("input", function(){ qtyInput.value=qtyInput.value.replace(/[^0-9]/g,""); });
      it.querySelector("[data-add]").addEventListener("click", function(){
        if(!available(v0)) return;
        window.IJStore.addToCart({ variant_id:v0.id, product_id:p.id, category_ids:(p.category_ids||[]), name:p.name, price:priceOf(v0), image:p.image, qty:clampQty(qtyInput.value) }, true);
      });

      // Raspadinha de cupom (só quando há desconto aplicável e produto disponível)
      if(coup){
        var base=priceOf(v0);
        var pctEl=it.querySelector(".lscr-pct"), baseEl=it.querySelector(".pp-base"), newEl=it.querySelector(".pp-new");
        var validEl=it.querySelector(".lscr-valid");
        var validText = fmtCupomDate(coup.end_date) ? ("Válido até "+fmtCupomDate(coup.end_date)) : "";
        var revealValid = function(){
          if(!validEl || !validText) return;
          var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
          if(reduce){ validEl.hidden=false; validEl.textContent=validText; validEl.classList.add("pulse"); return; }
          validEl.hidden=false; validEl.textContent=""; validEl.classList.add("typing");
          var i=0; (function t(){ validEl.textContent=validText.slice(0,i); if(i<validText.length){ i++; setTimeout(t,55); } else { validEl.classList.remove("typing"); validEl.classList.add("pulse"); } })();
        };
        mountScratch(it.querySelector(".lscr-stage"), {
          pct:pct,
          onProgress:function(disc){
            if(pctEl) pctEl.textContent=disc;
            if(disc>0){
              if(baseEl) baseEl.classList.add("struck");
              if(newEl){ newEl.hidden=false; newEl.innerHTML='<span class="cur">R$</span> '+money(base*(1-disc/100)).replace("R$ ",""); }
            }
          },
          onComplete:function(){ persistCoupon(coup.code, pct, coup); revealValid(); toastMsg("Cupom "+coup.code+" ativado · "+pct+"% OFF"); }
        });
      }
    });
    revealAll(plist.querySelectorAll(".pitem"));
    onResize = function(){ scratchers.forEach(function(s){ if(!s.cleared()) s.size(); }); };
    window.addEventListener("resize", onResize);
    window.scrollTo(0,0);
  }

  // galería de un produto: capas crossfade + auto-avance + miniaturas
  function gallery(mainEl, thumbsEl, imgs){
    imgs = imgs.filter(Boolean); if(!imgs.length){ return; }
    var a=document.createElement("div"); a.className="cm on"; a.style.backgroundImage="url('"+imgs[0]+"')";
    var b=document.createElement("div"); b.className="cm";
    mainEl.appendChild(a); mainEl.appendChild(b);
    if(imgs.length<2) return;
    imgs.forEach(function(s){ var im=new Image(); im.src=s; });

    var idx=0, front=a, back=b;
    function setThumbs(i){ var ts=thumbsEl.querySelectorAll(".th"); for(var k=0;k<ts.length;k++) ts[k].classList.toggle("on", k===i); }
    function go(i){
      i=((i%imgs.length)+imgs.length)%imgs.length;
      back.style.backgroundImage="url('"+imgs[i]+"')"; back.classList.add("on"); front.classList.remove("on");
      var tmp=front; front=back; back=tmp; idx=i; setThumbs(i);
    }
    imgs.forEach(function(src,i){
      var th=document.createElement("div"); th.className="th"+(i===0?" on":""); th.style.backgroundImage="url('"+src+"')";
      th.addEventListener("click", function(){ go(i); });
      thumbsEl.appendChild(th);
    });
    timers.push(setInterval(function(){ go(idx+1); }, 3500));
  }

  function priceBlock(v){
    if(!v || priceOf(v)<=0) return '<span style="font-size:17px;color:var(--muted)">Sob consulta</span>';
    var promo = v.promotional_price && Number(v.promotional_price)>0;
    var html = '<span class="cur">R$</span> ' + money(priceOf(v)).replace("R$ ","");
    if(promo) html += '<span class="old">'+money(v.price)+'</span>';
    return html;
  }

  window.addEventListener("popstate", function(){ if(DATA) route(); });
})();
</script>
